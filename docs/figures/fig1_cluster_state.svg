<svg width="100%" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>1D cluster state — standard MBQC resource state</title>
  <desc>A linear chain of five qubits in |+⟩ connected by CZ gates, forming a 1D cluster state. Single-qubit measurements M(θᵢ) on each qubit drive the computation.</desc>

  <style>
    text { font-family: sans-serif; fill: #1a1a1a; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; font-weight: 400; fill: #555; }
    .wire { stroke: #555; stroke-width: 1.5; fill: none; }
    .dashed { stroke: #888; stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .node-fill   { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.8; }
    .node-text   { fill: #3C3489; }
    .node-sub    { fill: #534AB7; }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text class="th" x="340" y="26" text-anchor="middle" fill="#1a1a1a">Fig. 1 — 1D cluster state (standard MBQC resource)</text>

  <!-- CZ edge lines -->
  <line x1="116" y1="108" x2="194" y2="108" class="wire"/>
  <line x1="246" y1="108" x2="324" y2="108" class="wire"/>
  <line x1="376" y1="108" x2="454" y2="108" class="wire"/>
  <line x1="506" y1="108" x2="584" y2="108" class="wire"/>

  <!-- CZ labels -->
  <text class="ts" x="155" y="98" text-anchor="middle">CZ</text>
  <text class="ts" x="285" y="98" text-anchor="middle">CZ</text>
  <text class="ts" x="415" y="98" text-anchor="middle">CZ</text>
  <text class="ts" x="545" y="98" text-anchor="middle">CZ</text>

  <!-- Qubit nodes -->
  <circle cx="80"  cy="108" r="34" class="node-fill"/>
  <text class="th node-text" x="80"  y="104" text-anchor="middle" dominant-baseline="central">|+⟩</text>
  <text class="ts node-sub"  x="80"  y="122" text-anchor="middle">q₁</text>

  <circle cx="220" cy="108" r="34" class="node-fill"/>
  <text class="th node-text" x="220" y="104" text-anchor="middle" dominant-baseline="central">|+⟩</text>
  <text class="ts node-sub"  x="220" y="122" text-anchor="middle">q₂</text>

  <circle cx="360" cy="108" r="34" class="node-fill"/>
  <text class="th node-text" x="360" y="104" text-anchor="middle" dominant-baseline="central">|+⟩</text>
  <text class="ts node-sub"  x="360" y="122" text-anchor="middle">q₃</text>

  <circle cx="490" cy="108" r="34" class="node-fill"/>
  <text class="th node-text" x="490" y="104" text-anchor="middle" dominant-baseline="central">|+⟩</text>
  <text class="ts node-sub"  x="490" y="122" text-anchor="middle">q₄</text>

  <circle cx="620" cy="108" r="34" class="node-fill"/>
  <text class="th node-text" x="620" y="104" text-anchor="middle" dominant-baseline="central">|+⟩</text>
  <text class="ts node-sub"  x="620" y="122" text-anchor="middle">q₅</text>

  <!-- Measurement arrows -->
  <line x1="80"  y1="142" x2="80"  y2="182" class="dashed" marker-end="url(#arrow)"/>
  <line x1="220" y1="142" x2="220" y2="182" class="dashed" marker-end="url(#arrow)"/>
  <line x1="360" y1="142" x2="360" y2="182" class="dashed" marker-end="url(#arrow)"/>
  <line x1="490" y1="142" x2="490" y2="182" class="dashed" marker-end="url(#arrow)"/>
  <line x1="620" y1="142" x2="620" y2="182" class="dashed" marker-end="url(#arrow)"/>

  <!-- Measurement labels -->
  <text class="ts" x="80"  y="200" text-anchor="middle" fill="#555">M(θ₁)</text>
  <text class="ts" x="220" y="200" text-anchor="middle" fill="#555">M(θ₂)</text>
  <text class="ts" x="360" y="200" text-anchor="middle" fill="#555">M(θ₃)</text>
  <text class="ts" x="490" y="200" text-anchor="middle" fill="#555">M(θ₄)</text>
  <text class="ts" x="620" y="200" text-anchor="middle" fill="#555">M(θ₅)</text>

  <!-- Caption -->
  <text class="ts" x="340" y="232" text-anchor="middle" fill="#888">H⊗ⁿ → CZ on neighbors → measure each qubit in basis M(θᵢ)</text>
</svg>
